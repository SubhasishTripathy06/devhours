<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DevHours — Project Tracker</title>
  <meta name="description" content="Track hours spent on personal engineering projects." />
  <meta name="theme-color" content="#0f0f11" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ═══════════════════════ DASHBOARD ═══════════════════════ -->
  <div id="app">

    <header class="header">
      <div class="header-inner">
        <div class="brand">
          <span class="brand-dot"></span>
          <h1>DevHours</h1>
        </div>
        <div class="header-meta" id="headerMeta">
          <span id="totalHoursDisplay">0h total</span>
        </div>
      </div>
    </header>

    <main class="main">

      <!-- Active Projects -->
      <section class="section">
        <div class="section-header">
          <h2 class="section-title">Active</h2>
          <button class="btn-add" id="btnAdd" aria-label="Add project" title="New project">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
              <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
          </button>
        </div>
        <div class="project-grid" id="activeGrid">
          <div class="empty-state" id="emptyActive">
            <div class="empty-icon">⚡</div>
            <p>No active projects yet.</p>
            <p class="empty-sub">Hit <strong>+</strong> to start tracking your first one.</p>
          </div>
        </div>
      </section>

      <!-- Archived Projects -->
      <section class="section" id="archiveSection" style="display:none">
        <div class="section-header">
          <h2 class="section-title">Completed</h2>
        </div>
        <div class="project-grid" id="archiveGrid"></div>
      </section>

    </main>
  </div>

  <!-- ═══════════════════════ PROJECT DETAIL MODAL ═══════════════════════ -->
  <div class="modal-overlay" id="detailOverlay" role="dialog" aria-modal="true" aria-label="Project detail">
    <div class="modal detail-modal">
      <button class="modal-close" id="detailClose" aria-label="Close">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>

      <!-- Circular Progress -->
      <div class="circle-container">
        <svg class="progress-ring" viewBox="0 0 200 200" aria-hidden="true">
          <circle class="ring-track" cx="100" cy="100" r="82"/>
          <circle class="ring-fill" id="ringFill" cx="100" cy="100" r="82"/>
        </svg>
        <div class="circle-inner">
          <span class="circle-pct" id="detailPct">0%</span>
          <span class="circle-label">complete</span>
        </div>
        <div class="complete-check" id="completeCheck">✓</div>
      </div>

      <h2 class="detail-name" id="detailName">Project Name</h2>

      <div class="detail-stats">
        <div class="stat">
          <span class="stat-value" id="detailSpent">0h 0m</span>
          <span class="stat-label">logged</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat">
          <span class="stat-value" id="detailTarget">0h</span>
          <span class="stat-label">target</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat">
          <span class="stat-value" id="detailRemaining">0h 0m</span>
          <span class="stat-label">remaining</span>
        </div>
      </div>

      <!-- Live timer display -->
      <div class="live-timer" id="liveTimer" style="display:none">
        <span class="timer-dot"></span>
        <span id="liveTimerDisplay">00:00:00</span>
      </div>

      <div class="detail-actions">
        <button class="btn btn-primary" id="btnStart">
          <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
          Start
        </button>
        <button class="btn btn-secondary" id="btnPause" style="display:none">
          <svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
          Pause
        </button>
        <button class="btn btn-ghost" id="btnEdit">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
          </svg>
          Edit
        </button>
        <button class="btn btn-danger" id="btnDelete">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
            <path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/>
          </svg>
          Delete
        </button>
      </div>
    </div>
  </div>

  <!-- ═══════════════════════ ADD / EDIT FORM MODAL ═══════════════════════ -->
  <div class="modal-overlay" id="formOverlay" role="dialog" aria-modal="true" aria-label="Project form">
    <div class="modal form-modal">
      <h2 class="modal-title" id="formTitle">New Project</h2>

      <label class="form-label" for="inputName">Project name</label>
      <input class="form-input" id="inputName" type="text" placeholder="e.g. Portfolio Website" maxlength="60" autocomplete="off" />

      <label class="form-label" for="inputTarget">Target hours</label>
      <input class="form-input" id="inputTarget" type="number" placeholder="e.g. 50" min="1" max="9999" />

      <div id="editSpentRow" style="display:none">
        <label class="form-label" for="inputSpent">Hours already logged</label>
        <input class="form-input" id="inputSpent" type="number" placeholder="0" min="0" max="9999" step="0.1" />
      </div>

      <div class="form-actions">
        <button class="btn btn-primary" id="btnFormSave">Create project</button>
        <button class="btn btn-ghost" id="btnFormCancel">Cancel</button>
      </div>
    </div>
  </div>

  <!-- ═══════════════════════ DELETE CONFIRM MODAL ═══════════════════════ -->
  <div class="modal-overlay" id="confirmOverlay" role="dialog" aria-modal="true" aria-label="Confirm delete">
    <div class="modal confirm-modal">
      <p class="confirm-text">Delete <strong id="confirmName"></strong>? This cannot be undone.</p>
      <div class="form-actions">
        <button class="btn btn-danger" id="btnConfirmYes">Delete</button>
        <button class="btn btn-ghost" id="btnConfirmNo">Cancel</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
